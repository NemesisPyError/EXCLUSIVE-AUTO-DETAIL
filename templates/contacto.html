{% extends "base.html" %}

{% block title %}Contacto — Exclusive Auto Detail{% endblock %}

{% block content %}
<section class="py-5" style="background:var(--bg-dark);min-height:60vh;">
    <div class="container">
        <h2 class="text-center mb-4" style="font-weight:700;color:var(--accent-gold);">
            Contacto
        </h2>
        <p class="text-center text-white-50 mb-5">
            Estamos para ayudarte
        </p>

        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <div class="card border-0 text-center py-4" style="background:var(--bg-card);color:var(--text-light);">
                    <div class="card-body">
                        <i class="fa-solid fa-location-dot fa-2x mb-3" style="color:var(--accent-gold);"></i>
                        <h5>Direccion</h5>
                        <p class="text-white-50">Hohenau, Itapua<br>Paraguay</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 text-center py-4" style="background:var(--bg-card);color:var(--text-light);">
                    <div class="card-body">
                        <i class="fa-solid fa-phone fa-2x mb-3" style="color:var(--accent-gold);"></i>
                        <h5>Telefono</h5>
                        <p class="text-white-50">Contactanos para agendar tu turno</p>
                        <a href="tel:+595981234567" class="btn btn-sm-custom" style="background:var(--accent-gold);color:#111;">
                            <i class="fa-brands fa-whatsapp me-1"></i> WhatsApp
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 text-center py-4" style="background:var(--bg-card);color:var(--text-light);">
                    <div class="card-body">
                        <i class="fa-solid fa-clock fa-2x mb-3" style="color:var(--accent-gold);"></i>
                        <h5>Horarios</h5>
                        <p class="text-white-50">Lunes a Sabado<br>07:00 — 17:00 hs</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
